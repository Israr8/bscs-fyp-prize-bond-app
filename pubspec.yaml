name: app
description: A Prize Bond Checking & Management App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # Firebase
  firebase_core:  ^2.27.0      #^2.24.2
  firebase_auth:  ^4.17.0               #^4.15.0
  cloud_firestore:  ^4.16.0                #^4.15.0
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^17.2.1

  # UI & Helpers
  image_picker: ^1.0.4
  google_mlkit_text_recognition: ^0.13.0
  camera: ^0.10.5+2
  permission_handler: ^12.0.1
  intl: ^0.18.1
  url_launcher: ^6.2.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  google_fonts: ^6.1.0
  mailer: ^6.2.0
  # winner effect k leye
  confetti: ^0.7.0
  path_provider: ^2.1.0
  share_plus: ^7.0.0
  file_picker: ^8.0.0
  connectivity_plus: ^6.0.5
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1

# App icon: logo.png se generate hota hai. Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter_18pt-Italic.ttf
        - asset: assets/fonts/Inter_18pt-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter_24pt-Bold.ttf
          weight: 700